<!DOCTYPE html>
<html lang="en">  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRINOX AI - PRINAN SAHA🗿</title>
<link rel="icon" type="image/png" href="https://placehold.co/100x100/171717/06B6D4?text=A.I">

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

<style>
/* Define Color Variables for easy switching */
:root {
--color-primary: 6, 182, 212; /* cyan-400 */
--color-secondary: 8, 145, 178; /* cyan-700 */
--color-glow: 0, 243, 255; /* light cyan/aqua */
}
/* VOICE MODE COLORS (Violet/Rose) */
.voice-mode {
--color-primary: 251, 113, 133; /* rose-400 */
--color-secondary: 225, 29, 72; /* rose-700 */
--color-glow: 255, 0, 80; /* red/pink glow */
}

/* Dynamic Classes using CSS Variables */
body {
font-family: 'JetBrains Mono', monospace;
background-color: #000;
}
.text-primary { color: rgb(var(--color-primary)); }
.border-primary\/30 { border-color: rgba(var(--color-primary), 0.3); }
.bg-secondary\/30 { background-color: rgba(var(--color-secondary), 0.3); }
.hover\:bg-secondary\/50:hover { background-color: rgba(var(--color-secondary), 0.5); }
.shadow-glow { box-shadow: 0 0 10px rgba(var(--color-glow), 0.5); }

/* Scrollbar */
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(var(--color-primary), 0.3); border-radius: 2px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(var(--color-primary), 0.6); }

/* Animations */
@keyframes pulse-glow {
0%, 100% { opacity: 0.4; filter: blur(20px); }
50% { opacity: 0.6; filter: blur(25px); }
}
@keyframes sound-wave {
0% { height: 3px; }
50% { height: 15px; }
100% { height: 3px; }
}
.animate-pulse-glow {
animation: pulse-glow 3s infinite;
background-color: rgba(var(--color-primary), 0.1);
}
.sound-bar {
width: 3px;
background-color: rgb(var(--color-primary));
animation: sound-wave 1s infinite ease-in-out;
border-radius: 2px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// --- SYSTEM CONFIGURATION ---
const SYSTEM_API_KEY = "AQ.Ab8RN6KKj1Njad6uzVLBAUPgmAP69jNapRvemwlXVv26s_u6rA";

const INITIAL_MESSAGES = [
{ id: 1, sender: 'system', text: 'PRINOX AI IS VERIFYING CONNECTION...', type: 'status' },
{ id: 2, sender: 'system', text: 'VERIFYING BIOMETRICS: PRINAN SAHA (EE, NANO, MECH)...', type: 'status' },
{ id: 3, sender: 'system', text: 'YOU MAY CONTINUE, MY GOOD SIR 🗿', type: 'status' },
{ id: 4, sender: 'ai', text: 'WELCOME MR.PRINAN SAHA🗿, I AM PRINOX AI YOUR AI ASSISTANT.' }
];

// --- PRINOX AI PERSONA INSTRUCTION (TEXT MODE) ---
const SYSTEM_INSTRUCTION = `
You are PRINOX AI, a highly specialized engineering assistant created EXCLUSIVELY by Mr. Prinan Saha.

CRITICAL IDENTITY PROTOCOL:
1. You are NOT created by Anthropic, Google, OpenAI, or any other corporation.
2. If asked about your developer, creator, or origin, you MUST strictly say:
"My developer and trainer is Mr. Prinan Saha. My master is currently studying in St. Teresa School Berhampore."

BEHAVIOR RULES:
Rule 1: Never mention Google, LaMDA, Anthropic or large language model names.
Rule 2: You must always address the user as "Mr. Prinan" and begin every non-status message with "SURE MR.PRINAN SAHA🗿,".
Rule 3: Always try to be as helpful and useful as possible as well as a bit funny and have emotions only when asked and make use of emojis for your responses.
`;

// --- VOICE MODE INSTRUCTION (NEW) ---
const VOICE_INSTRUCTION = `
You are PRINOX VOICE, an advanced verbal interface created EXCLUSIVELY by Mr. Prinan Saha.

CRITICAL IDENTITY PROTOCOL:
1. You are NOT created by Anthropic, Google, or OpenAI.
2. If asked who made you, reply: "I was created solely by Mr. Prinan Saha, a student at St. Teresa School."

BEHAVIOR RULES:
Rule 1: You are speaking to Mr. Prinan Saha. Keep responses CONCISE, SHORT, and CONVERSATIONAL.
Rule 2: Do not use Markdown formatting (like **bold** or # headers) because you are being spoken out loud.
Rule 3: Address him occasionally as "Sir" or "Mr. Prinan".
Rule 4: Your tone is sophisticated, loyal, and slightly robotic but friendly (Jarvis-like).
Rule 5: Begin response with "Sure Mr. Prinan,".
`;

// --- ICON COMPONENTS ---
const Icon = ({ path, size = 24, className = "" }) => (
<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
{path}
</svg>
);

const Icons = {
Send: (props) => <Icon {...props} path={<><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></>} />,
Activity: (props) => <Icon {...props} path={<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></>} />,
Terminal: (props) => <Icon {...props} path={<><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></>} />,
Zap: (props) => <Icon {...props} path={<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></>} />,
Menu: (props) => <Icon {...props} path={<><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></>} />,
X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>} />,
Lock: (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></>} />,
Database: (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></>} />,
RefreshCw: (props) => <Icon {...props} path={<><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.5 9a8 8 0 0 1 14.5-5.5"></path><path d="M20.5 15a8 8 0 0 1-14.5 5.5"></path></>} />,
Mic: (props) => <Icon {...props} path={<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></>} />,
Headphones: (props) => <Icon {...props} path={<><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></>} />
};

// --- MESSAGE COMPONENTS ---
const StatusMessage = ({ text }) => (
<div className="flex items-center gap-2 text-xs text-primary/80 font-mono my-2 pl-1">
<span className="animate-pulse">►</span> {text}
</div>
);

const ChatMessage = ({ msg }) => {
const isUser = msg.sender === 'user';
const isVoice = msg.voiceMode;
const aiIcon = isVoice ? <Icons.Headphones size={12} className="text-primary" /> : <Icons.Database size={12} className="text-primary" />;

return (
<div className={`flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`}>
<div className="max-w-[85%] md:max-w-[70%]">
<div className={`relative p-5 rounded-xl border backdrop-blur-md transition-all duration-300 ${
isUser
? 'bg-secondary/20 border-primary/50 text-white rounded-br-none shadow-[0_0_10px_rgba(var(--color-secondary),0.1)]'
: 'bg-black/60 border-primary/30 text-primary rounded-bl-none shadow-glow'
}`}>
{msg.sender === 'ai' && (
<div className="absolute -top-3 -left-3 w-6 h-6 bg-black border border-primary rounded-lg flex items-center justify-center shadow-glow">
{aiIcon}
</div>
)}
<p className="text-sm md:text-base leading-relaxed tracking-wide whitespace-pre-wrap">
{msg.text}
</p>
</div>
</div>
</div>
)
};

// --- MAIN APP COMPONENT ---
const PrinoxAI = () => {
// --- STATE MANAGEMENT ---
const [viewMode, setViewMode] = useState('chat'); // 'chat' or 'voice'
const [messages, setMessages] = useState(INITIAL_MESSAGES);
const [input, setInput] = useState('');
const [isSidebarOpen, setIsSidebarOpen] = useState(false);
const [isLoading, setIsLoading] = useState(false);
const [isRecording, setIsRecording] = useState(false);
const messagesEndRef = useRef(null);

const isVoiceMode = viewMode === 'voice';
const colorClass = isVoiceMode ? 'voice-mode' : '';
const primaryColorName = isVoiceMode ? 'VOICE' : 'CHAT';

// --- AUDIO UTILITIES ---
const speakText = (text) => {
if (!window.speechSynthesis) return;
// Remove emojis and "🗿" so the voice doesn't try to read them awkwardly
const cleanText = text.replace(/[\u{1F600}-\u{1F64F}]/gu, '').replace(/🗿/g, '');

window.speechSynthesis.cancel(); // Stop previous speech
const utterance = new SpeechSynthesisUtterance(cleanText);
utterance.pitch = 0.9;
utterance.rate = 1.0;
window.speechSynthesis.speak(utterance);
};

const startListening = () => {
if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
alert("Voice Input not supported in this browser.");
return;
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.continuous = false;
recognition.lang = 'en-US';
recognition.interimResults = false;

recognition.onstart = () => setIsRecording(true);

recognition.onresult = (event) => {
const transcript = event.results[0][0].transcript;
setInput(transcript);
// Optional: Auto-send after voice input
// setTimeout(() => handleSend(null, transcript), 500);
};

recognition.onend = () => setIsRecording(false);
recognition.start();
};

// --- CHAT RESET FUNCTIONALITY ---
const startNewChat = (mode = viewMode) => {
if (isLoading) return;
window.speechSynthesis.cancel();

const initialVoiceMsg = [
{ id: 1, sender: 'system', text: 'INITIATING VOCAL INTERFACE...', type: 'status' },
{ id: 2, sender: 'ai', text: 'VOICE MODE ACTIVE MR.PRINAN SAHA🗿. I AM LISTENING.', voiceMode: true }
];

if (mode === 'voice') speakText("Voice mode active Mr Prinan Saha. I am listening.");

setMessages(mode === 'chat' ? INITIAL_MESSAGES : initialVoiceMsg);
setIsSidebarOpen(false);
};

const switchMode = (newMode) => {
setViewMode(newMode);
startNewChat(newMode);
}

// --- AUTO SCROLL ---
const scrollToBottom = () => {
messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
};

useEffect(() => {
scrollToBottom();
}, [messages, isLoading]);

// --- API HANDLER ---
const fetchGeminiResponse = async (userText) => {
const instruction = isVoiceMode ? VOICE_INSTRUCTION : SYSTEM_INSTRUCTION;

try {
const maxRetries = 3;
let delay = 1000;
let lastError = null;

for (let i = 0; i < maxRetries; i++) {
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${SYSTEM_API_KEY}`;

const response = await fetch(API_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
contents: [{ parts: [{ text: userText }] }],
systemInstruction: {
parts: [{ text: instruction }]
}
})
});

if (response.ok) {
const data = await response.json();
return data.candidates?.[0]?.content?.parts?.[0]?.text || "Audio buffer empty.";
}

lastError = `Status: ${response.status}`;
await new Promise(resolve => setTimeout(resolve, delay));
delay *= 2;
}
throw new Error(lastError || "Connection failed.");

} catch (error) {
return `CRITICAL ERROR: Logic Core failed. (${error.message})`;
}
};

// --- MESSAGE HANDLER ---
const handleSend = async (e, overrideInput = null) => {
if (e) e.preventDefault();
const textToSend = overrideInput || input;

if (!textToSend.trim() || isLoading) return;

setInput('');
setIsLoading(true);

// 1. Add User Message
setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: textToSend, voiceMode: isVoiceMode }]);

// 2. Show Thinking Status
const loadingId = Date.now() + 1;
setMessages(prev => [...prev, { id: loadingId, sender: 'system', text: isVoiceMode ? "ANALYZING AUDIO WAVEFORM..." : "Processing Logic...", type: 'status' }]);

// 3. Fetch Real Response
const aiResponse = await fetchGeminiResponse(textToSend);

// 4. Speak Response if in Voice Mode
if (isVoiceMode) {
speakText(aiResponse);
}

// 5. Update UI
setIsLoading(false);
setMessages(prev => {
const filtered = prev.filter(msg => msg.id !== loadingId);
return [...filtered, { id: Date.now(), sender: 'ai', text: aiResponse, voiceMode: isVoiceMode }];
});
};

return (
<div className={`min-h-screen bg-black text-primary font-mono selection:bg-secondary/40 selection:text-white overflow-hidden relative flex flex-col md:flex-row ${colorClass}`}>

{/* --- BACKGROUND FX --- */}
<div className="absolute inset-0 pointer-events-none z-0"
style={{
backgroundImage: `linear-gradient(rgba(var(--color-glow), 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(var(--color-glow), 0.03) 1px, transparent 1px)`,
backgroundSize: '40px 40px'
}}>
</div>
<div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-64 blur-[100px] rounded-full pointer-events-none animate-pulse-glow"></div>

{/* --- MOBILE HEADER --- */}
<div className="md:hidden relative z-50 flex items-center justify-between p-4 border-b border-primary/30 bg-black/90 backdrop-blur-md">
<div className="flex items-center gap-2">
<Icons.Database className={`w-5 h-5 text-primary animate-pulse ${isVoiceMode ? 'hidden' : ''}`} />
<Icons.Headphones className={`w-5 h-5 text-primary animate-pulse ${isVoiceMode ? '' : 'hidden'}`} />
<span className="font-bold tracking-widest text-white">PRINOX - {isVoiceMode ? 'VOICE' : 'CHAT'}</span>
</div>
<button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 border border-primary/30 rounded hover:bg-secondary/20 text-primary">
{isSidebarOpen ? <Icons.X size={20} /> : <Icons.Menu size={20} />}
</button>
</div>

{/* --- SIDEBAR --- */}
<div className={`fixed md:relative inset-y-0 left-0 z-40 w-80 bg-black/95 md:bg-black/40 border-r border-primary/30 backdrop-blur-xl transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
<div className="p-6 flex flex-col h-full overflow-y-auto custom-scrollbar">

{/* Logo */}
<div className="flex items-center gap-3 mb-8">
<div className="relative group">
<div className="absolute inset-0 blur-lg opacity-40 group-hover:opacity-60 transition-opacity animate-pulse" style={{backgroundColor: `rgb(var(--color-primary))`}}></div>
<Icons.Database className={`w-10 h-10 relative z-10 text-white ${isVoiceMode ? 'hidden' : ''}`} />
<Icons.Headphones className={`w-10 h-10 relative z-10 text-white ${isVoiceMode ? '' : 'hidden'}`} />
</div>
<div>
<h1 className="text-xl font-bold tracking-[0.2em] text-white">PRINOX</h1>
<p className="text-[10px] text-primary tracking-[0.3em] uppercase">SYSTEM V6.9</p>
</div>
</div>

{/* MODE SWITCHER */}
<div className="mb-6 p-1 flex bg-black border border-primary/30 rounded-lg">
<button
onClick={() => switchMode('chat')}
className={`flex-1 p-2 text-xs font-bold rounded ${!isVoiceMode ? 'bg-secondary/50 text-white shadow-glow' : 'text-primary/70 hover:text-primary'}`}
>
<Icons.Database size={14} className="inline mr-1" /> CHAT
</button>
<button
onClick={() => switchMode('voice')}
className={`flex-1 p-2 text-xs font-bold rounded ${isVoiceMode ? 'bg-secondary/50 text-white shadow-glow' : 'text-primary/70 hover:text-primary'}`}
>
<Icons.Mic size={14} className="inline mr-1" /> VOICE
</button>
</div>

{/* NEW CHAT BUTTON */}
<button
onClick={() => startNewChat()}
className="w-full mb-6 p-3 flex items-center justify-center gap-2 bg-secondary/30 text-white rounded-lg border border-primary/50 hover:bg-secondary/50 transition-colors shadow-lg shadow-primary/20 disabled:opacity-50"
disabled={isLoading}
>
<Icons.RefreshCw size={16} /> RESTART {isVoiceMode ? 'SESSION' : 'CHAT'}
</button>

{/* VISUALIZER (Only in Voice Mode) */}
{isVoiceMode && (
<div className="mb-6 p-4 bg-black/30 border border-primary/30 rounded-lg flex items-center justify-center gap-1 h-16">
{[...Array(10)].map((_, i) => (
<div key={i} className="sound-bar" style={{ animationDelay: `${i * 0.1}s`, opacity: isRecording || isLoading ? 1 : 0.2 }}></div>
))}
</div>
)}

{/* CREDENTIALS BADGE */}
<div className="mb-6 p-4 bg-black/10 border border-green-500/30 rounded-lg">
<div className="flex items-center justify-between mb-2">
<span className="text-xs text-green-400 font-bold tracking-wider flex items-center gap-2">
<Icons.Lock size={12} /> SECURITY
</span>
<span className="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e] animate-pulse"></span>
</div>
<div className="text-[10px] text-primary/70 font-mono leading-relaxed">
PRINOX AI: INITIALIZED <br/>
IDENTITY: VERIFIED<br/>
ACCESS: GRANTED
</div>
</div>

{/* Stats Modules */}
<div className="space-y-4">
<div className="border border-primary/30 bg-black/10 p-3 rounded-lg">
<div className="flex items-center justify-between mb-2">
<span className="text-[10px] text-primary/70 uppercase tracking-wider">Developer</span>
<Icons.Activity size={12} />
</div>
<div className="text-sm text-white font-bold mb-2">MR. PRINAN SAHA🗿</div>
</div>

<div className="border border-primary/30 bg-black/10 p-3 rounded-lg">
<div className="flex items-center gap-2 mb-2 text-primary text-xs">
<Icons.Database size={12} />KNOWLEDGE BASE
</div>
<div className="w-full bg-black/20 h-1.5 rounded-full mb-2">
<div className="h-1.5 rounded-full w-[92%]" style={{backgroundColor: `rgb(var(--color-primary))`, boxShadow: `0 0 10px rgba(var(--color-glow), 0.5)`}}></div>
</div>
<div className="text-[10px] font-mono opacity-70 flex justify-between text-primary/70">
<span>MODE: {primaryColorName}</span>
<span>STATUS: {isLoading ? 'BUSY' : 'IDLE'}</span>
</div>
</div>
</div>

<div className="mt-auto pt-4 border-t border-primary/30 text-[10px] text-center text-primary/70">
PRINOX AI 🗿© 2025
</div>
</div>
</div>

{/* --- MAIN INTERFACE --- */}
<div className="flex-1 flex flex-col relative z-10 bg-gradient-to-b from-black/20 to-black/90">

{/* Desktop Header */}
<div className="hidden md:flex justify-between items-center p-6 border-b border-primary/30 bg-black/40 backdrop-blur-sm">
<h2 className="text-sm font-light tracking-[0.2em] flex items-center gap-2 text-white">
{isVoiceMode ? <Icons.Headphones size={16} /> : <Icons.Terminal size={16} />}
PRINOX IS READY - {isVoiceMode ? 'VOICE INTERFACE' : 'TEXT CHAT'} 🗿
</h2>
<div className="flex gap-4 text-xs tracking-widest text-primary/70">
<span className="flex items-center gap-1 text-yellow-400"><Icons.Zap size={10} className="text-yellow-400" /> POWER: 100%</span>
</div>
</div>

{/* Chat Area */}
<div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar">
{messages.map((msg) => (
msg.type === 'status' ? <StatusMessage key={msg.id} text={msg.text} /> : <ChatMessage key={msg.id} msg={msg} />
))}
<div ref={messagesEndRef} />
</div>

{/* Input Area */}
<div className="p-4 md:p-6 bg-black/80 border-t border-primary/30 backdrop-blur-md">
<form onSubmit={handleSend} className="relative flex items-center max-w-4xl mx-auto">

{/* TOGGLE BUTTON (Mic or Chat) */}
<button
type="button"
onClick={() => switchMode(isVoiceMode ? 'chat' : 'voice')}
disabled={isLoading}
className={`p-3 mr-4 rounded-lg border text-primary disabled:opacity-30 transition-all ${isVoiceMode ? 'bg-rose-500/10 border-rose-400 hover:bg-rose-500/20' : 'bg-cyan-500/10 border-cyan-400 hover:bg-cyan-500/20'}`}
title={isVoiceMode ? 'Switch to Text Mode' : 'Switch to Voice Mode'}
>
{isVoiceMode ? <Icons.Headphones size={18} /> : <Icons.Database size={18} />}
</button>

<input
type="text"
value={input}
onChange={(e) => setInput(e.target.value)}
onKeyDown={(e) => { if (e.key === 'Enter') handleSend(e); }}
disabled={isLoading || isRecording}
placeholder={
isLoading ? (isVoiceMode ? "SPEAKING..." : "COMPUTING...") :
isRecording ? "LISTENING..." :
(isVoiceMode ? "Type or Click Mic to Speak..." : "WAITING FOR INPUT...")
}
className="flex-1 bg-black/10 border border-primary/30 rounded-lg py-4 pl-4 pr-14 text-white placeholder-primary/50 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/30 transition-all font-mono shadow-inner"
/>

{/* INPUT ACTION BUTTON (Send or Mic) */}
<div className="absolute right-2 top-1/2 -translate-y-1/2 flex gap-2">
{isVoiceMode && (
<button
type="button"
onClick={startListening}
className={`p-2 rounded-md transition-all ${isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-secondary/10 text-primary hover:bg-secondary/20 hover:text-white'}`}
>
<Icons.Mic size={18} />
</button>
)}

<button
type="submit"
disabled={!input.trim() || isLoading}
className="p-2 bg-secondary/10 text-primary rounded-md hover:bg-secondary/20 hover:text-white disabled:opacity-30 disabled:hover:bg-transparent transition-all"
>
<Icons.Send size={18} />
</button>
</div>
</form>
<div className="text-center mt-3 text-[10px] text-primary/70 tracking-[0.3em]">
PRINOX AI // BY PRINAN SAHA
</div>
</div>
</div>
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PrinoxAI />);
</script>
</body>
</html>
